services:
  - type: web
    name: isbn-komarc-backend
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn backend_api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ALADIN_TTB_KEY
        value: ttbboyeong09010919001
        sync: false
      - key: NL_SEOKJI_CERT_KEY
        sync: false

  - type: web
    name: isbn-komarc-streamlit
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: bash start_streamlit.sh
    autoDeploy: true
    envVars:
      - key: BACKEND_INTERNAL_HOST
        fromService:
          name: isbn-komarc-backend
          type: web
          property: host
      - key: BACKEND_INTERNAL_PORT
        fromService:
          name: isbn-komarc-backend
          type: web
          property: port